name: Release desktop

# Builds the Windows NW.js desktop app and publishes it as a GitHub Release.
# Produces two assets:
#   • Casewright-Setup-<version>.exe   — per-user installer (single executable)
#   • Casewright-<version>-win-x64.zip — portable build (unzip + run Casewright.exe)
#
# Trigger by pushing a version tag (the version is taken from the tag):
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab, supplying the version.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0) — without the leading 'v'"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: false

# Allow the job to create releases and tags.
permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Resolve the release version + tag from the trigger (tag name or manual input).
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $v = '${{ inputs.version }}'
          } else {
            $v = '${{ github.ref_name }}'
          }
          $v = $v -replace '^v', ''
          if ($v -notmatch '^\d+\.\d+\.\d+') {
            Write-Error "Version '$v' is not a valid semver — tag releases like v0.1.0."
            exit 1
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$v"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing Casewright v$v"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache the downloaded NW.js runtime so reruns don't re-fetch ~100 MB.
      - name: Cache NW.js runtime
        uses: actions/cache@v4
        with:
          path: apps/desktop/.nwcache
          key: nwjs-win-x64-${{ hashFiles('apps/desktop/package.json') }}

      # Only install what the desktop app needs (+ its workspace deps).
      - name: Install
        run: pnpm install --frozen-lockfile --filter @casewright/desktop...

      - name: Typecheck
        run: pnpm --filter @casewright/desktop typecheck

      - name: Test
        run: pnpm --filter @casewright/desktop test

      # Build the renderer, stage runtime deps, and run nw-builder (+ portable zip).
      - name: Package (nw-builder + portable zip)
        env:
          CASEWRIGHT_VERSION: ${{ steps.ver.outputs.version }}
        run: pnpm --filter @casewright/desktop package:win

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" "/DMyAppVersion=${{ steps.ver.outputs.version }}" "apps/desktop/build-resources/casewright.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Verify artifacts
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $installer = "apps/desktop/build/Casewright-Setup-$v.exe"
          $zip       = "apps/desktop/build/Casewright-$v-win-x64.zip"
          foreach ($f in @($installer, $zip)) {
            if (-not (Test-Path $f)) { throw "Missing expected artifact: $f" }
            Write-Host ("{0}  ({1:N1} MB)" -f $f, ((Get-Item $f).Length / 1MB))
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Casewright ${{ steps.ver.outputs.tag }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            apps/desktop/build/Casewright-Setup-${{ steps.ver.outputs.version }}.exe
            apps/desktop/build/Casewright-${{ steps.ver.outputs.version }}-win-x64.zip
