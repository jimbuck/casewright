name: Deploy web

# Builds the Astro marketing site (apps/web) and publishes it to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/brand/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # No version pin here — action-setup reads it from the root package.json
      # "packageManager" field (pnpm 11).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Only install what the web app needs — keeps the NW.js runtime out of CI.
      - name: Install
        run: pnpm install --frozen-lockfile --filter @casewright/web...

      - name: Build
        run: pnpm build:web
        env:
          # configure-pages derives the correct origin + base path for this repo,
          # whether it's a project site (/casewright) or a user/org site (/).
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
